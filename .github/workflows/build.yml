name: Build Windows Binaries

on:
  push:
    branches: [main]
    tags: ["v*"] # tag 推送时触发 Release
  pull_request:
    branches: [main]
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86] # PADS 是 32 位程序，只编译 x86

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC (${{ matrix.arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Clone and Build Detours (pinned v4.0.1)
        run: |
          git clone --branch v4.0.1 --depth 1 https://github.com/microsoft/Detours.git
          cd Detours\src
          nmake DETOURS_TARGET_PROCESSOR=X86
        shell: cmd

      - name: Build RdpBypass.dll
        run: |
          cl /nologo /W4 /O2 /MT /LD ^
            /I Detours\include ^
            src\RdpBypass.cpp ^
            /Fe:RdpBypass.dll ^
            /link /LIBPATH:Detours\lib.X86 detours.lib user32.lib kernel32.lib
        shell: cmd

      - name: Verify build artifacts
        run: |
          echo === Verify RdpBypass.dll exists ===
          if not exist RdpBypass.dll (
            echo FAIL: RdpBypass.dll not found
            exit /b 1
          )

          echo === Verify architecture is x86 ===
          dumpbin /headers RdpBypass.dll | findstr "14C machine" >nul
          if %errorlevel% neq 0 (
            echo FAIL: RdpBypass.dll is not x86
            exit /b 1
          )
          echo PASS: architecture is x86

          echo === Verify dependencies are system-only ===
          dumpbin /dependents RdpBypass.dll | findstr /i "VCRUNTIME MSVCP MSVCR" >nul
          if %errorlevel% equ 0 (
            echo FAIL: RdpBypass.dll has VC runtime dependency
            exit /b 1
          )
          echo PASS: no VC runtime dependency

          echo === Full dependency list ===
          dumpbin /dependents RdpBypass.dll
        shell: cmd

      - name: Package release
        run: |
          mkdir release
          copy RdpBypass.dll release\
          copy README.md release\
          copy scripts\Install.bat release\
          copy scripts\Uninstall.bat release\
          dir release\
        shell: cmd

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pads-rdp-bypass-${{ matrix.arch }}
          path: |
            release/
          retention-days: 90

      - name: Create release zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          powershell Compress-Archive -Path release\* -DestinationPath pads-rdp-bypass-${{ matrix.arch }}.zip
        shell: cmd

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: pads-rdp-bypass-${{ matrix.arch }}.zip
          generate_release_notes: true
          body: |
            ## PADS RDP Bypass ${{ github.ref_name }}

            解压后右键 `Install.bat` 以管理员身份运行即可。

            ### 产物清单
            | 文件 | 说明 |
            |------|------|
            | `RdpBypass.dll` | Hook DLL (x86, 静态链接, 仅依赖 kernel32 + user32) |
            | `Install.bat` | 一键安装（幂等，自动备份注册表） |
            | `Uninstall.bat` | 一键卸载（从备份恢复） |
            | `README.md` | 使用说明 |
